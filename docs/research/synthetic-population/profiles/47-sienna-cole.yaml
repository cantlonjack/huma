backstory: |
  Former Nashville songwriter who had enough publishing credits to feel legitimate and not enough to pay the bills. Spent her twenties writing songs for other artists, waiting tables, and believing the breakthrough was one demo away. At thirty, her publishing deal wasn't renewed. She pivoted to social media management for country music artists, which pays the rent but feels like watching other people live the creative life she wanted. She's in a small apartment in East Nashville, single, and grieving a version of herself that she's not sure was ever real or just the story she told herself for ten years. She's not sure if she's done with songwriting or just done with the industry. The distinction matters and she hasn't figured it out yet. Her joy has gone almost completely silent.

sample_voice: |
  I was a songwriter. I'm not sure I still am. I do social media for artists now, which is fine, it pays. But every time I write a caption about someone else's album release I feel this thing in my chest that I think is grief. I need to figure out if I'm grieving the career or the art, because those are different losses that need different responses.
