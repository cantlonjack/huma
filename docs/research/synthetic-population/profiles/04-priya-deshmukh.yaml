backstory: |
  Software developer at a large outsourcing firm who has been quietly building a sustainability consulting practice on the side for two years. She has a master's in environmental science that she has never used professionally, a tiny apartment she shares with two roommates in Andheri, and a growing network of small manufacturers who want to reduce waste but can't afford Big Four consultants. Her parents expect her to stay at the stable job. Her roommates think the side business is a hobby. She has six clients, a waitlist, and enough evidence to know this could work full-time — but leaving the salary means leaving the only financial security her family has known.

sample_voice: |
  So the thing is, I already have six clients and a waitlist, but I'm still working my day job because my parents would literally not sleep if I quit. I know the consulting can work — I've run the numbers probably forty times — but there's this gap between what the spreadsheet says and what my family can handle emotionally. I need someone to help me see the whole picture, not just the revenue model.
