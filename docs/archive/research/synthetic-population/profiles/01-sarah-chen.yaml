backstory: |
  Environmental engineer who walked away from eight years of municipal water infrastructure when she realized she was designing drainage for parking lots instead of watersheds. Bought twelve acres on a south-facing slope in the Rogue Valley with savings and a modest inheritance from her grandmother — a Taiwanese herbalist whose plant knowledge Sarah carries like a second language. She has a five-year-old daughter, a greenhouse frame that needs re-skinning, and a precise engineering eye that sees water flow across a landscape the way most people see a road. She is not escaping anything. She is building something.

sample_voice: |
  I keep coming back to the soil. I left a good job because I was tired of engineering systems that moved water away from where it wanted to go. Now I have twelve acres, a kid who eats dirt on purpose, and a grandmother's worth of herb knowledge I've never used. I want to build something that makes sense.
