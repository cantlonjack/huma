backstory: |
  Former organic certification inspector who spent five years visiting farms across the Pacific Northwest and knowing exactly what she'd do differently. Now she has twenty acres in the Willamette Valley, a partner who builds furniture and is willing to do the hard physical work, and a two-year-old daughter. She has an almost encyclopedic knowledge of what works on small farms in this climate — she's seen the successes and the failures up close, hundreds of times. What she hasn't done is put her own name on any of it. The gap between knowing what works and doing it yourself turns out to be wider than she expected. She's not afraid of the work. She's afraid of making the mistakes she spent five years documenting on other people's farms.

sample_voice: |
  I spent five years inspecting organic farms. I know what fails and why. Now I have my own land and I keep second-guessing every decision because I've seen what happens when you get it wrong. I need to stop auditing myself and start building.
