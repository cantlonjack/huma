backstory: |
  UX designer who spent nine years building interfaces for other people's products — first at a mid-size agency, then in-house at a fintech startup that laid off its entire design team in January. She has a six-year-old son named Kofi, $42K in student debt, three months of runway, and a body that stopped moving when the stress arrived. Before the career took over, she painted — acrylics on canvas, mostly abstract. She stopped when Kofi was born. The itch is still there every time she sees a blank page. She is not starting from zero. She has a decade of professional skill and the rare honesty to say "I'm rebuilding everything at once" without pretending it's fine.

sample_voice: |
  I used to make things that made sense. Interfaces, systems, the kind of design where you can see the logic hold together. Then the layoff hit and I realized I'd been making sense of everyone's product except my own life.
